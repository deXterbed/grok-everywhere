<!doctype html>
<html>
    <head>
        <title>Grok everywhere</title>
        <link rel="stylesheet" href="styles/main.css" />
        <link rel="stylesheet" href="styles/conversation.css" />
        <style>
            :root {
                --text-primary: rgba(236, 236, 241, 1);
                --text-secondary: rgba(130, 130, 148, 1);
                --background-primary: #0e0e11;
                --background-secondary: rgba(26, 26, 32, 0.97);
                --border-light: rgba(255, 255, 255, 0.07);
                --surface-primary: rgba(26, 26, 32, 0.97);
                --link-color: #7c8af7;
                --accent: #7c6af7;
                --accent-dim: rgba(124, 106, 247, 0.12);
                --accent-border: rgba(124, 106, 247, 0.4);
            }

            body,
            html {
                margin: 0;
                padding: 0;
                height: 100vh;
                font-family:
                    system-ui,
                    -apple-system,
                    "Segoe UI",
                    Roboto,
                    Ubuntu,
                    Cantarell,
                    "Noto Sans",
                    sans-serif;
                display: flex;
                flex-direction: column;
                background-color: var(--background-primary);
                color: var(--text-primary);
                line-height: 1.5;
                overflow: hidden;
                font-size: 16px;
                font-weight: 400;
            }

            /* Chat container */
            #chat-container {
                flex-grow: 1;
                overflow-y: auto;
                padding: 1rem 0 150px 0;
                background-color: var(--background-primary);
                margin-top: 0;
                position: relative;
                z-index: 1;
            }

            /* Message styles */
            .message-wrapper {
                padding: 0.35rem 1rem;
                background-color: transparent;
                position: relative;
                z-index: 1;
            }

            .message-wrapper.user {
                background-color: transparent;
            }

            .message {
                max-width: 48rem;
                margin: 0 auto;
                display: flex;
                gap: 1rem;
                padding: 0.25rem 0;
            }

            .message-wrapper.user .message-content {
                background-color: rgba(124, 106, 247, 0.1);
                border: 1px solid rgba(124, 106, 247, 0.18);
                border-radius: 14px 14px 4px 14px;
                padding: 10px 14px;
                max-width: 520px;
                margin-left: auto;
                font-weight: 500;
                font-size: 14px;
                color: var(--text-primary);
            }

            .message-wrapper.assistant .message-content {
                background-color: rgba(28, 28, 35, 0.7);
                border: 1px solid var(--border-light);
                border-radius: 4px 14px 14px 14px;
                padding: 12px 14px;
                max-width: 580px;
                color: var(--text-primary);
            }

            .message-content {
                font-size: 14px;
                line-height: 1.5;
                overflow-wrap: break-word;
                word-wrap: break-word;
                word-break: break-word;
                white-space: normal;
                font-weight: 400;
                color: var(--text-primary);
                max-width: 100%;
                width: 100%;
            }

            .message-wrapper.user .avatar {
                display: none;
            }

            /* Image in message */
            .message-content img {
                max-width: 100%;
                border-radius: 8px !important;
                margin: 8px 0 !important;
                border: 1px solid white !important;
                height: auto !important;
                width: 400px !important;
                display: block !important;
            }

            /* Input container */
            #input-container {
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: linear-gradient(to top, var(--background-primary) 80%, transparent);
                padding: 0.4rem 0.75rem 0.75rem;
                display: flex;
                flex-direction: column;
                align-items: center;
                z-index: 1000;
            }

            .input-wrapper {
                width: 100%;
                max-width: 600px;
                margin: 0 auto;
                background-color: var(--background-secondary);
                border-radius: 14px;
                border: 1px solid var(--border-light);
                display: flex;
                flex-direction: column;
                padding: 8px 10px 10px;
                transition: border-color 0.2s ease, box-shadow 0.2s ease;
            }

            .input-wrapper:focus-within {
                border-color: var(--accent-border);
                box-shadow: 0 0 0 3px var(--accent-dim), 0 4px 20px rgba(0, 0, 0, 0.4);
            }

            #message-input {
                width: 100%;
                resize: none;
                padding: 6px 0 24px;
                background-color: transparent;
                border: none;
                font-family: inherit;
                font-size: 14px;
                line-height: 1.4;
                color: var(--text-primary);
                margin: 0;
                overflow-y: hidden;
                outline: none !important;
                height: 50px;
                min-height: 50px;
                max-height: 160px;
                box-sizing: border-box;
                font-weight: 400;
                display: block;
            }

            #message-input:focus {
                outline: none;
            }

            #message-input:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            #message-input::placeholder {
                color: var(--text-secondary);
            }

            .input-toolbar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-top: 10px;
            }

            .toolbar-left {
                display: flex;
                align-items: center;
                gap: 2px;
            }

            .toolbar-right {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            #api-key-missing {
                display: none;
                color: #ff4a4a;
                text-align: center;
                padding: 0.75rem;
                background-color: #fff2f2;
                border-radius: 0.5rem;
                margin-bottom: 0.75rem;
                font-size: 0.875rem;
                width: 100%;
                max-width: 48rem;
            }

            .image-button {
                background: transparent;
                border: 1px solid transparent;
                padding: 4px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 7px;
                transition: background-color 0.15s ease, border-color 0.15s ease;
                opacity: 0.55;
                width: 26px;
                height: 26px;
            }

            .image-button:hover {
                background-color: rgba(255, 255, 255, 0.07);
                opacity: 0.85;
            }

            .image-button.active {
                opacity: 1;
            }

            /* Context mode indicators */
            .image-button.content-mode {
                background-color: rgba(92, 138, 255, 0.12) !important;
                border-color: rgba(92, 138, 255, 0.35) !important;
                opacity: 1;
            }

            .image-button.screenshot-mode {
                background-color: rgba(255, 165, 0, 0.12) !important;
                border-color: rgba(255, 165, 0, 0.35) !important;
                opacity: 1;
            }

            .send-button {
                width: 30px;
                height: 30px;
                background: var(--accent);
                border: none;
                padding: 0;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 50%;
                transition: background-color 0.15s ease, transform 0.1s ease;
                flex-shrink: 0;
            }

            .send-button path {
                stroke: #fff;
            }

            .send-button:hover {
                background-color: #9080ff !important;
                transform: scale(1.05);
            }

            .send-button:disabled,
            .send-button.loading {
                background-color: rgba(124, 106, 247, 0.35) !important;
                transform: none !important;
            }

            /* Enhanced loading states */
            .loading {
                opacity: 0.6;
                pointer-events: none;
            }

            .send-button.loading {
                position: relative;
                overflow: hidden;
            }

            .send-button.loading svg {
                opacity: 0;
            }

            .send-button.loading::after {
                content: "";
                position: absolute;
                top: 50%;
                left: 50%;
                width: 16px;
                height: 16px;
                margin: -8px 0 0 -8px;
                border: 2px solid transparent;
                border-top: 2px solid currentColor;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }

            /* Enhanced typing indicator */
            .typing-indicator {
                display: none;
                padding: 0.25rem 1rem;
                background-color: transparent;
                animation: slideInUp 0.25s ease-out;
                position: relative;
                z-index: 10;
            }

            @keyframes slideInUp {
                from {
                    opacity: 0;
                    transform: translateY(20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .typing-indicator .message {
                max-width: 48rem;
                margin: 0 auto;
                display: flex;
                gap: 1rem;
                padding: 0.25rem 0;
            }

            .typing-indicator .message-content {
                background-color: var(--background-secondary);
                border-radius: 20px;
                padding: 12px;
                max-width: 600px;
                display: flex;
                align-items: center;
                gap: 12px;
                animation: typingPulse 2s ease-in-out infinite;
            }

            @keyframes typingPulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.8;
                }
            }

            /* Context mode loading indicators */
            .context-loading {
                position: relative;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 4px 8px;
                background-color: rgba(64, 64, 64, 0.8);
                border-radius: 12px;
                font-size: 11px;
                color: var(--text-secondary);
                margin-bottom: 8px;
            }

            .context-loading::before {
                content: "";
                width: 12px;
                height: 12px;
                border: 2px solid transparent;
                border-top: 2px solid currentColor;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            /* Input container loading state */
            #input-container.loading {
                position: relative;
            }

            #input-container.loading::after {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background-color: rgba(0, 0, 0, 0.3);
                border-radius: 8px;
                pointer-events: none;
            }

            /* Header */
            #header-container {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background-color: var(--background-primary);
                border-bottom: 1px solid var(--border-light);
                z-index: 1000;
                display: flex;
                align-items: center;
                min-height: 50px;
                height: 50px;
                padding: 0 8px;
            }

            /* API Key section */
            #api-key-section {
                flex: 1;
                display: flex;
                align-items: center;
                padding: 0 4px;
            }

            #api-key-input-container {
                display: flex;
                align-items: center;
                gap: 6px;
                width: 100%;
            }

            #api-key-input {
                flex-grow: 1;
                padding: 7px 11px;
                border: 1px solid var(--border-light);
                border-radius: 8px;
                font-size: 13px;
                background-color: rgba(255, 255, 255, 0.04);
                color: var(--text-primary);
                font-weight: 400;
                transition: border-color 0.15s ease;
                outline: none;
            }

            #api-key-input:focus {
                border-color: var(--accent-border);
            }

            #api-key-input.saved {
                color: var(--text-secondary);
            }

            #save-api-key {
                background: none;
                border: none;
                cursor: pointer;
                padding: 7px;
                border-radius: 8px;
                transition: all 0.15s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                color: var(--text-secondary);
                flex-shrink: 0;
            }

            #save-api-key:hover {
                background-color: rgba(124, 106, 247, 0.12);
                color: var(--accent);
            }

            #save-api-key.active {
                background-color: rgba(124, 106, 247, 0.2) !important;
                color: var(--accent) !important;
            }

            /* Page context header */
            #page-context {
                flex: 1;
                display: flex;
                align-items: center;
                gap: 10px;
                min-width: 0;
                padding: 0 4px;
            }

            #page-icon-wrap {
                flex-shrink: 0;
                width: 30px;
                height: 30px;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid var(--border-light);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #page-favicon {
                border-radius: 4px;
            }

            #page-info {
                flex: 1;
                min-width: 0;
            }

            #page-title-text {
                font-size: 13px;
                font-weight: 600;
                color: var(--text-primary);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.3;
            }

            #page-url-text {
                font-size: 11px;
                color: var(--text-secondary);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.3;
                margin-top: 1px;
            }

            #settings-button {
                flex-shrink: 0;
                background: transparent;
                border: none;
                padding: 7px;
                border-radius: 8px;
                color: var(--text-secondary);
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s, color 0.15s;
            }

            #settings-button:hover {
                background: rgba(255, 255, 255, 0.08);
                color: var(--text-primary);
            }


            /* Make context loading more visible */
            .context-loading {
                position: relative;
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background-color: rgba(64, 64, 64, 0.9);
                border-radius: 12px;
                font-size: 12px;
                color: var(--text-primary);
                margin-bottom: 8px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            }

            .context-loading::before {
                content: "";
                width: 12px;
                height: 12px;
                border: 2px solid transparent;
                border-top: 2px solid currentColor;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            /* Content refresh notification animations */
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateX(100%);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }

            @keyframes slideOut {
                from {
                    opacity: 1;
                    transform: translateX(0);
                }
                to {
                    opacity: 0;
                    transform: translateX(100%);
                }
            }

            /* Streaming cursor animation */
            @keyframes blink {
                0%,
                50% {
                    opacity: 1;
                }
                51%,
                100% {
                    opacity: 0;
                }
            }

            /* Model badge — now lives in the toolbar */
            #model-badge {
                display: inline-flex;
                align-items: center;
                gap: 4px;
                padding: 4px 8px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 500;
                color: var(--text-secondary);
                background: transparent;
                border: none;
                cursor: default;
                white-space: nowrap;
            }

            #model-badge svg {
                opacity: 0.6;
                flex-shrink: 0;
            }

            /* Clear history button — now in toolbar-left */
            #clear-history-button {
                padding: 6px;
                background-color: transparent;
                border: 1px solid transparent;
                border-radius: 8px;
                color: var(--text-secondary);
                cursor: pointer;
                transition: all 0.15s ease;
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                opacity: 0.5;
            }

            #clear-history-button:hover {
                background-color: rgba(255, 82, 82, 0.12);
                border-color: rgba(255, 82, 82, 0.25);
                color: #ff6b6b;
                opacity: 1;
            }

            #clear-history-button:active {
                background-color: rgba(255, 82, 82, 0.2);
            }

            /* Refresh button */
            .refresh-button {
                margin-left: 6px;
                padding: 2px 8px;
                background: transparent !important;
                color: #ff6b6b !important;
                border: 1px solid rgba(255, 107, 107, 0.4) !important;
                border-radius: 10px;
                font-size: 10px;
                font-weight: 500;
                cursor: pointer;
                transition: background-color 0.15s ease, border-color 0.15s ease;
                vertical-align: middle;
            }

            .refresh-button:hover {
                background: rgba(255, 107, 107, 0.12) !important;
                border-color: rgba(255, 107, 107, 0.6) !important;
            }

            /* Markdown styling for message content */
            .message-content h1 {
                font-size: 1.5em;
                font-weight: bold;
                margin: 0.5em 0;
                color: var(--text-primary);
                border-bottom: 1px solid var(--border-light);
                padding-bottom: 0.25em;
            }

            .message-content h2 {
                font-size: 1.3em;
                font-weight: bold;
                margin: 0.4em 0;
                color: var(--text-primary);
                border-bottom: 1px solid var(--border-light);
                padding-bottom: 0.2em;
            }

            .message-content h3 {
                font-size: 1.1em;
                font-weight: bold;
                margin: 0.3em 0;
                color: var(--text-primary);
            }

            .message-content p {
                margin: 0.5em 0;
                line-height: 1.5;
                word-wrap: break-word;
                overflow-wrap: break-word;
                word-break: break-word;
                max-width: 100%;
                box-sizing: border-box;
            }

            .message-content ul,
            .message-content ol {
                margin: 0.5em 0;
                padding-left: 1.5em;
                word-wrap: break-word;
                overflow-wrap: break-word;
                max-width: 100%;
                box-sizing: border-box;
            }

            .message-content li {
                margin: 0.25em 0;
                line-height: 1.4;
                word-wrap: break-word;
                overflow-wrap: break-word;
                word-break: break-word;
                max-width: 100%;
                box-sizing: border-box;
            }

            .message-content code {
                background-color: rgba(64, 64, 64, 0.8);
                color: #f8f8f2;
                padding: 0.2em 0.4em;
                border-radius: 3px;
                font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
                font-size: 0.9em;
                border: 1px solid rgba(255, 255, 255, 0.1);
                word-wrap: break-word;
                overflow-wrap: break-word;
                white-space: pre-wrap;
                display: inline-block;
                max-width: 100%;
                box-sizing: border-box;
            }

            .message-content pre {
                background-color: rgba(32, 32, 32, 0.9);
                color: #f8f8f2;
                padding: 1em;
                border-radius: 8px;
                overflow-x: auto;
                overflow-y: visible;
                margin: 0.5em 0;
                border: 1px solid rgba(255, 255, 255, 0.1);
                font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
                font-size: 0.9em;
                line-height: 1.4;
                white-space: pre;
                word-wrap: normal;
                max-width: 100%;
                box-sizing: border-box;
            }

            .message-content pre code {
                background: none;
                padding: 0;
                border: none;
                font-size: inherit;
                white-space: pre;
                word-wrap: normal;
                overflow-wrap: normal;
                display: block;
                width: 100%;
            }

            .message-content a {
                color: #4a9eff;
                text-decoration: underline;
                transition: color 0.2s ease;
            }

            .message-content a:hover {
                color: #6bb6ff;
            }

            .message-content strong {
                font-weight: bold;
                color: var(--text-primary);
            }

            .message-content em {
                font-style: italic;
                color: var(--text-primary);
            }

            .message-content blockquote {
                border-left: 3px solid var(--accent);
                margin: 0.5em 0;
                padding-left: 1em;
                color: var(--text-secondary);
                font-style: italic;
            }

            /* Scrollbar */
            #chat-container::-webkit-scrollbar {
                width: 4px;
            }

            #chat-container::-webkit-scrollbar-track {
                background: transparent;
            }

            #chat-container::-webkit-scrollbar-thumb {
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 4px;
            }

            #chat-container::-webkit-scrollbar-thumb:hover {
                background-color: rgba(255, 255, 255, 0.2);
            }

            /* Hide empty state when messages exist */
            #chat-container:has(.message-wrapper) #empty-state {
                display: none;
            }

            /* Empty state */
            #empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: calc(100vh - 200px);
                gap: 10px;
                opacity: 0.4;
                pointer-events: none;
                user-select: none;
            }

            #empty-state img {
                width: 36px;
                height: 36px;
                opacity: 0.6;
                filter: grayscale(0.3);
            }

            #empty-state p {
                font-size: 13px;
                color: var(--text-secondary);
                margin: 0;
            }
        </style>
    </head>
    <body>
        <div id="header-container">
            <!-- API key entry (shown when no key is set) -->
            <div id="api-key-section">
                <div id="api-key-input-container">
                    <input
                        type="password"
                        id="api-key-input"
                        placeholder="Enter your xAI API key"
                    />
                    <button id="save-api-key">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M19 21H5C3.89543 21 3 20.1046 3 19V5C3 3.89543 3.89543 3 5 3H16L21 8V19C21 20.1046 20.1046 21 19 21Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M17 21V13H7V21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M7 3V8H15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- Page context (shown when key is set) -->
            <div id="page-context" style="display: none">
                <div id="page-icon-wrap">
                    <img id="page-favicon" src="icons/grok.png" width="18" height="18" alt="" />
                </div>
                <div id="page-info">
                    <div id="page-title-text">Loading…</div>
                    <div id="page-url-text"></div>
                </div>
                <button id="settings-button" title="Update API Key">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

        <div id="chat-container">
            <div id="empty-state">
                <img src="icons/grok.png" alt="Grok" />
                <p>Ask anything about this page</p>
            </div>
        </div>

        <div id="input-container">
            <div class="input-wrapper">
                <div id="api-key-missing">
                    Please set your xAI API key in the extension options
                </div>
                <textarea id="message-input" rows="1" placeholder="Ask anything"></textarea>
                <div class="input-toolbar">
                    <div class="toolbar-left">
                        <button class="image-button">
                            <img src="icons/chrome.png" width="18" height="18" />
                        </button>
                        <button
                            id="clear-history-button"
                            title="Clear conversation history"
                            style="display: none"
                        >
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M3 6h18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

                            </svg>
                        </button>
                    </div>
                    <div class="toolbar-right">
                        <div id="model-badge">
                            <span id="current-model-display">Grok 3</span>
                            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <button class="send-button">
                            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 19V5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M5 12l7-7 7 7" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="sidepanel.js"></script>
